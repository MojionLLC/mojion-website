      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. We design every engagement so the client owns the code, prompts, workflows, and integrations. No vendor lock-in, no surprise licensing. You can choose monthly hosting and monitoring or a full buyout with optional maintenance."
      }
    },

      "@type": "Question",
      "name": "What does a custom AI receptionist cost?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Every engagement is priced per-client because outcomes and goals vary widely. Call volume, integrations, compliance requirements, and the level of human-in-the-loop oversight all shape the scope. We don't publish price tiers because the right system for a small home services team isn't the right system for a multi-location equipment dealer. After a free Discovery call, we send a fixed-scope quote tied to the outcomes you actually want."
      }
    },
    {
      "@type": "Question",
      "name": "How is a custom MoJion build different from Synthflow, Smith.ai, or Frontdesk?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Three differences. First, you own the system. We don't rent you a seat on our platform. Second, our architecture restricts the AI to language and classification while deterministic workflows enforce business outcomes, so failures are isolated and auditable. Third, accountability is built in. E&O insurance, structured logging, and human-in-the-loop escalation are first-class behaviors, not afterthoughts."
      }
    },

      "@type": "Question",
      "name": "Is your AI HIPAA-compliant?",

        "@type": "Answer",

      }

      }
    },
